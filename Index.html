<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boda Nydia & Octavio</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #7D2935;
  --rose-light: #F3E8EA;
  --rose-dark: #561820;
  --rose-mid: #A34455;
  --sage: #6B8F71;
  --sage-light: #EBF0E8;
  --gold: #9C6B2E;
  --gold-light: #F7F0E3;
  --gold-mid: #C4973A;
  --kraft: #EDE0CB;
  --ink: #2A1F1A;
  --ink-soft: #5C4A3A;
  --ink-mute: #9C8878;
  --surface: #FAF7F2;
  --surface2: #F2EBE0;
  --border: rgba(90,50,30,0.10);
  --border-strong: rgba(90,50,30,0.22);
  --radius: 10px;
  --radius-lg: 16px;
  --font-display: 'Great Vibes', cursive;
  --font-heading: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: var(--font-body);
  background: var(--surface);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px 40px;
}

/* ── Header ── */
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header-names {
  font-family: var(--font-display);
  font-size: 72px;
  color: var(--rose-dark);
  line-height: 1;
  margin-bottom: 6px;
}
.header-date {
  font-family: var(--font-heading);
  font-size: 16px;
  color: var(--ink-mute);
  letter-spacing: .1em;
}
.header-place {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink-mute);
  margin-top: 4px;
}

/* ── Divisor ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 36px;
  width: 100%;
  max-width: 360px;
}
.divider-line { flex: 1; height: 0.5px; background: var(--border-strong); }
.divider-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rose-mid); }

/* ── Tarjetas de acceso ── */
.cards {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  max-width: 360px;
}

.card {
  background: var(--surface);
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 20px 22px;
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .12s;
  text-decoration: none;
  color: inherit;
  display: flex;
  align-items: center;
  gap: 16px;
}
.card:hover {
  border-color: var(--rose-mid);
  background: var(--rose-light);
  transform: translateY(-1px);
}
.card:active { transform: scale(.98); }

.card-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.card-icon.fotos { background: var(--rose-light); }
.card-icon.planner { background: var(--gold-light); }

.card-body { flex: 1; }
.card-title {
  font-family: var(--font-heading);
  font-size: 19px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 2px;
}
.card-sub {
  font-size: 12px;
  color: var(--ink-mute);
  line-height: 1.5;
}

.card-arrow {
  font-size: 18px;
  color: var(--ink-mute);
  flex-shrink: 0;
}

/* ── Modal PIN ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(42,31,26,.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.visible { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  width: 100%;
  max-width: 320px;
  text-align: center;
  border: 0.5px solid var(--border-strong);
}
.modal-title {
  font-family: var(--font-heading);
  font-size: 22px;
  color: var(--rose-dark);
  margin-bottom: 6px;
}
.modal-sub {
  font-size: 13px;
  color: var(--ink-mute);
  margin-bottom: 24px;
  line-height: 1.5;
}

/* PIN dots display */
.pin-display {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 24px;
}
.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 1.5px solid var(--border-strong);
  background: transparent;
  transition: background .15s, border-color .15s;
}
.pin-dot.filled {
  background: var(--rose);
  border-color: var(--rose);
}
.pin-dot.error {
  background: transparent;
  border-color: var(--rose);
  animation: shake .3s ease;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Teclado numérico */
.pin-keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.pin-key {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 8px;
  font-family: var(--font-heading);
  font-size: 20px;
  color: var(--ink);
  cursor: pointer;
  transition: background .1s, transform .1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.pin-key:hover { background: var(--kraft); }
.pin-key:active { transform: scale(.93); background: var(--kraft); }
.pin-key.delete {
  font-size: 16px;
  color: var(--ink-mute);
  font-family: var(--font-body);
}

.modal-cancel {
  font-size: 13px;
  color: var(--ink-mute);
  cursor: pointer;
  padding: 6px;
  border: none;
  background: none;
  font-family: var(--font-body);
}
.modal-cancel:hover { color: var(--rose); }

/* ── Footer ── */
.footer {
  margin-top: 48px;
  font-size: 11px;
  color: var(--ink-mute);
  opacity: .6;
  text-align: center;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-names">Nydia & Octavio</div>
  <div class="header-date">29 · Mayo · 2026</div>
  <div class="header-place">Quinta Arreboleda · Arteaga, Coahuila</div>
</div>

<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-dot"></div>
  <div class="divider-line"></div>
</div>

<!-- Menú de acceso -->
<div class="cards">

  <a class="card" href="NYOWedding-foto.html">
    <div class="card-icon fotos">📸</div>
    <div class="card-body">
      <div class="card-title">Fotos de la boda</div>
      <div class="card-sub">Sube y comparte tus fotos del día</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <div class="card" onclick="abrirPIN()">
    <div class="card-icon planner">📋</div>
    <div class="card-body">
      <div class="card-title">Wedding Planner</div>
      <div class="card-sub">Proveedores, invitados, timeline</div>
    </div>
    <div class="card-arrow">›</div>
  </div>

</div>

<!-- Modal PIN -->
<div class="modal-overlay" id="modal-overlay" onclick="cerrarSiFondo(event)">
  <div class="modal">
    <div class="modal-title">Acceso privado</div>
    <div class="modal-sub">Ingresa el PIN para continuar</div>

    <div class="pin-display" id="pin-display">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="pin-keypad">
      <div class="pin-key" onclick="presionar('1')">1</div>
      <div class="pin-key" onclick="presionar('2')">2</div>
      <div class="pin-key" onclick="presionar('3')">3</div>
      <div class="pin-key" onclick="presionar('4')">4</div>
      <div class="pin-key" onclick="presionar('5')">5</div>
      <div class="pin-key" onclick="presionar('6')">6</div>
      <div class="pin-key" onclick="presionar('7')">7</div>
      <div class="pin-key" onclick="presionar('8')">8</div>
      <div class="pin-key" onclick="presionar('9')">9</div>
      <div class="pin-key" style="visibility:hidden"></div>
      <div class="pin-key" onclick="presionar('0')">0</div>
      <div class="pin-key delete" onclick="borrar()">⌫</div>
    </div>

    <button class="modal-cancel" onclick="cerrarPIN()">Cancelar</button>
  </div>
</div>

<div class="footer">NYOWedding · v 2026-05-17</div>

<script>
const PIN_CORRECTO = '0327';
let pinActual = '';

function abrirPIN() {
  pinActual = '';
  actualizarDots();
  document.getElementById('modal-overlay').classList.add('visible');
}

function cerrarPIN() {
  pinActual = '';
  actualizarDots();
  document.getElementById('modal-overlay').classList.remove('visible');
}

function cerrarSiFondo(e) {
  if (e.target === document.getElementById('modal-overlay')) cerrarPIN();
}

function presionar(num) {
  if (pinActual.length >= 4) return;
  pinActual += num;
  actualizarDots();
  if (pinActual.length === 4) validar();
}

function borrar() {
  pinActual = pinActual.slice(0, -1);
  actualizarDots();
}

function actualizarDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.classList.remove('filled', 'error');
    if (i < pinActual.length) dot.classList.add('filled');
  }
}

function validar() {
  if (pinActual === PIN_CORRECTO) {
    setTimeout(() => {
      cerrarPIN();
      window.location.href = 'NYOWedding-invitados.html';
    }, 200);
  } else {
    /* Error: sacudir dots y limpiar */
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('d' + i);
      dot.classList.remove('filled');
      dot.classList.add('error');
    }
    setTimeout(() => {
      pinActual = '';
      actualizarDots();
    }, 700);
  }
}

/* Teclado físico también funciona */
document.addEventListener('keydown', e => {
  if (!document.getElementById('modal-overlay').classList.contains('visible')) return;
  if (e.key >= '0' && e.key <= '9') presionar(e.key);
  if (e.key === 'Backspace') borrar();
  if (e.key === 'Escape') cerrarPIN();
});
</script>
</body>
</html>
